[shared]
# this table is used to specify options common to all tests

# the file from GRACKLE_ROOT/src/example to copy
src_file = "c_example.c"

# the path to the example binary relative to the sample project directory
# that will be produced by executing the supplied commands
output_binary = "build/example_app"

# enumerate each of the test cases
# ================================

[test.simple]
parametrize = [
  # first, use a copy of Grackle from its build-directory
  {image="shared_build", Grackle_DIR="/home/gr-user/grackle/build"},
  {image="static_build", Grackle_DIR="/home/gr-user/grackle/build"},

  # next, use a copy of Grackle that was installed in the local installation directory
  {image="shared_install", Grackle_DIR="/home/gr-user/local"},
  {image="static_install", Grackle_DIR="/home/gr-user/local"},
  {image="static_install_conftimeprefix", Grackle_DIR="/home/gr-user/local"},
]

# the docker image to use to run the test
image.use-param = "image"

# list the commands to construct output_binary
cmds = [
  "Grackle_DIR='{Grackle_DIR}' cmake -Bbuild",
  "cmake --build build"
]

# specify whether LD_LIBRARY_PATH must be modified to include the search path
# for the Grackle library
#
# This is false for all tests in this file because the sample project is built
# with CMake and the resulting executable is NEVER "installed" (i.e. any tests
# resulting executable access it from the build directory).
#
# For some added context, this relates to some "magic" performed by CMake
# (unrelated to the fact that Grackle, itself, was built with CMake)
# * when creating a target in a build directory that is linked against a
#   shared lib dependency, and that dependency is properly declared, CMake
#   will embed metadata (e.g. RPATH, RUNPATH) into the target so that the
#   operating system's dynamic loader knows to look for the dependencies
#   in the same places that the linker had found previously found them.
#   -> this makes it possible to execute the target from the build directory
#      if the dependencies are outside of standard system search paths without
#      needing to modify LD_LIBRARY_PATH
#   -> CMake does this to simplify testing of the target. The cost is that the
#      target may miss out on some of the benefits of using shared libraries
#      (compared to using a static lib)
# * when CMake installs a target, it strips out that extra metadata. Thus,
#   when you execute the installed target (or an executable linked against the
#   target), the operating system's dynamic loader only searches for the
#   dependencies in the system's normal search paths and locations
#   specified by LD_LIBRARY_PATH
#   -> If the dependency isn't in the normal search path, the user needs to
#      modify LD_LIBRARY_PATH to give the appropriate hint
#   -> By doing this, CMake ensures that all the potential benefits of
#      depending upon shared libraries are made available to the installed
#      target (if the target can actually use them)
#
# I believe this strategy is common among other modern build systems (like
# meson and maybe bazel)
override_LD_LIBRARY_PATH = false

[test.SelectStaticLib]
# in this case, the shared/static libraries were both installed in the
# local installation directory. Since the call to `find_package` in the sample
# project's CMakeLists.txt does NOT communicate a preference,
# - a weak preference is inferred from the `BUILD_SHARED_LIBS` cmake variable
# - when `BUILD_SHARED_LIBS` isn't explicitly defined, we prefer static

# the only difference between the images is the order of installing the shared
# and static variants
#
# TODO: instead of running this test twice, it would be better if we:
#   - ran this test with just one of these images
#   - wrote a separate test that explicitly checked that the layout and
#     contents of the local install directories are identical regardless of
#     installation order
#   - fundamentally, we're only really worried about
#     - missing files
#     - the meta installation files (i.e. the CMake Package Configuration file
#       and the pkg-config file) being messed up. Doing a direct comparison
#       would be FAR more robust
parametrize = [{image = "shared_static_install"}, {image = "static_shared_install"}]

image.use-param = "image"
cmds = [
  "Grackle_DIR='/home/gr-user/local' cmake -Bbuild",
  "cmake --build build"
]
override_LD_LIBRARY_PATH = false

[test.SelectSharedLib]
# in this case, the shared/static libraries were both installed in the
# local installation directory. Since the call to `find_package` in the sample
# project's CMakeLists.txt does NOT communicate a preference,
# - a weak preference is inferred from the `BUILD_SHARED_LIBS` cmake variable
# - when `BUILD_SHARED_LIBS` isn't explicitly defined, we prefer static

# the only difference between the images is the order of installing the shared
# and static variants
parametrize = [{image = "shared_static_install"}, {image = "static_shared_install"}]

image.use-param = "image"
cmds = [
  "Grackle_DIR='/home/gr-user/local' cmake -Bbuild -DBUILD_SHARED_LIBS=ON",
  "cmake --build build"
]
override_LD_LIBRARY_PATH = false
