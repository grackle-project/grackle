[common]
# specify options common to all tests
# -> these options can be overridden on a case-by-case basis

# the file from GRACKLE_ROOT/src/example to copy
src_file = "c_example.c"

# the path to the example binary relative to the sample project directory
output_binary = "example_app"


# enumerate each of the test cases
[test.static]
image = ["static_install", "static_install_conftimeprefix"]
cmds = ["PKG_CONFIG_PATH=/home/gr-user/local/lib/pkgconfig make"]
# specify whether LD_LIBRARY_PATH must be modified
override_LD_LIBRARY_PATH = false

[test.shared]
image = "shared_install"
cmds = ["PKG_CONFIG_PATH=/home/gr-user/local/lib/pkgconfig make"]
# specify whether LD_LIBRARY_PATH must be modified
override_LD_LIBRARY_PATH = true

[test.SelectSharedLib]
# in this case both the shared and static libraries were both installed in the
# local installation directory.
# -> the call to find_package in CMakeLists.txt does NOT communicate a
#    preference for using the shared or static lib
# -> thus, a weak preference is inferred from the value of the
#    BUILD_SHARED_LIBS cmake variable
# -> since BUILD_SHARED_LIBS isn't explicitly defined, we prefer static

# the only difference between the images is the order of installing the shared
# and static variants
#
# TODO: instead of running this test twice, it would be better if we:
#   - ran this test with just one of these images
#   - wrote a separate test that explicitly checked that the layout and
#     contents of the local install directories are identical regardless of
#     installation order
#   - fundamentally, we're only really worried about
#     - missing files
#     - the meta installation files (i.e. the CMake Package Configuration file
#       and the pkg-config file) being messed up. Doing a direct comparison
#       would be FAR more robust
image = ["shared_static_install", "static_shared_install"]
cmds = ["PKG_CONFIG_PATH=/home/gr-user/local/lib/pkgconfig make"]
# specify whether LD_LIBRARY_PATH must be modified
override_LD_LIBRARY_PATH = true

